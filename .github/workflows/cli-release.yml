name: CLI Release

on:
  push:
    branches: [main]
    paths:
      - "cli/src/**"
      - "cli/infrastructure/**"
      - "cli/openclaw-config/**"
      - "cli/.changeset/**"
      - "cli/package.json"
      - "cli/package-lock.json"
      - "cli/tsconfig.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build

      # changesets/action has a bug where readChangesetState() ignores the cwd
      # input, so it always looks for .changeset/ at the repo root instead of
      # the cwd directory. We work around this by detecting changesets ourselves
      # and running version/publish manually.
      - name: Check for changesets
        id: changesets
        working-directory: cli
        run: |
          HAS_CHANGESETS=false
          for f in .changeset/*.md; do
            if [ "$f" != ".changeset/README.md" ] && [ -f "$f" ]; then
              HAS_CHANGESETS=true
              break
            fi
          done
          echo "hasChangesets=$HAS_CHANGESETS" >> "$GITHUB_OUTPUT"

      - name: Version packages
        if: steps.changesets.outputs.hasChangesets == 'true'
        working-directory: cli
        run: npx changeset version

      - name: Create Release PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore(cli): version packages"
          commit-message: "chore(cli): version packages"
          branch: changeset-release/main
          body: |
            This PR was opened by the release workflow because changesets were
            detected. Merging this PR will publish the new version to npm.
          labels: release

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npx changeset publish
