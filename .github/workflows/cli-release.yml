name: CLI Release

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli-release.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Typecheck
        working-directory: cli
        run: npm run typecheck

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Unit tests
        working-directory: cli
        run: npm test

      - name: Bootstrap initial release tag
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pkg = JSON.parse(fs.readFileSync('cli/package.json', 'utf8'));
            const tag = `v${pkg.version}`;

            const refs = await github.paginate(github.rest.git.listMatchingRefs, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'tags/v',
              per_page: 100,
            });

            if (refs.length > 0) {
              core.notice(`Found ${refs.length} existing release tag(s); skipping bootstrap.`);
              return;
            }

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `openclaw-azure-cli ${tag}`,
              body: [
                'Bootstrap release created automatically before semantic-release took over.',
                '',
                `This tag anchors future automated releases for \`${pkg.name}\`.`,
              ].join('\n'),
            });

            core.notice(`Created bootstrap tag and release ${tag}.`);

      - name: Guard npm README
        run: |
          version=$(node -p "require('./cli/package.json').version")
          if [[ "$version" != *-* ]] && grep -q '@beta' cli/README.md; then
            echo "cli/README.md still references @beta for stable version $version"
            exit 1
          fi

      - name: Release
        working-directory: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npm run release
